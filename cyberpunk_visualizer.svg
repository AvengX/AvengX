<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="cyber-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF" />
      <stop offset="100%" stop-color="#BD00FF" />
    </linearGradient>
    <style>
      .bg { fill: #0D0E15; }
      .grid { stroke: #1e2230; stroke-width: 1; }
      .binary-text {
        font-family: 'Fira Code', monospace, Courier;
        font-size: 11px;
        fill: #00E5FF;
      }
    </style>
  </defs>
  
  <rect class="bg" width="100%" height="100%" rx="10" />
  
  <!-- Perspective Grid Lines -->
  <g class="grid">
    <line x1="0" y1="240" x2="800" y2="240" />
    <line x1="0" y1="270" x2="800" y2="270" />
    <line x1="100" y1="200" x2="0" y2="300" />
    <line x1="250" y1="200" x2="150" y2="300" />
    <line x1="400" y1="200" x2="400" y2="300" />
    <line x1="550" y1="200" x2="650" y2="300" />
    <line x1="700" y1="200" x2="800" y2="300" />
  </g>
  
  <!-- Binary Data Streams with SMIL Opacity Animation -->
  <text x="40" y="50" class="binary-text" opacity="0.3">
    01010110 01000101 01001110 01000111 01011000
    <animate attributeName="opacity" values="0.15;0.7;0.15" dur="2.5s" repeatCount="indefinite" begin="0s" />
  </text>
  <text x="40" y="75" class="binary-text" opacity="0.3">
    SYS.TELEMETRY: ACTIVE [PORT 8080]
    <animate attributeName="opacity" values="0.15;0.7;0.15" dur="2.5s" repeatCount="indefinite" begin="0.5s" />
  </text>
  <text x="480" y="50" class="binary-text" opacity="0.3">
    NEURAL.NET: CONNECTED
    <animate attributeName="opacity" values="0.15;0.7;0.15" dur="2.5s" repeatCount="indefinite" begin="1s" />
  </text>
  <text x="480" y="75" class="binary-text" opacity="0.3">
    PROCESSING LOGS... 100%
    <animate attributeName="opacity" values="0.15;0.7;0.15" dur="2.5s" repeatCount="indefinite" begin="1.5s" />
  </text>

  <!-- Cybernetic Neural Paths with SMIL Stroke Animation -->
  <path d="M 150 150 Q 300 80 400 150 T 650 150" stroke="url(#cyber-grad)" stroke-width="2" fill="none" stroke-dasharray="600" stroke-dashoffset="600">
    <animate attributeName="stroke-dashoffset" values="600;0;-600" dur="6s" repeatCount="indefinite" />
  </path>
  <path d="M 150 120 Q 300 220 400 120 T 650 120" stroke="#BD00FF" stroke-width="2" fill="none" stroke-dasharray="600" stroke-dashoffset="600">
    <animate attributeName="stroke-dashoffset" values="600;0;-600" dur="6s" repeatCount="indefinite" begin="-3s" />
  </path>
  
  <!-- Active Node Points with SMIL Pulsating Animation -->
  <circle cx="150" cy="150" r="6" fill="#00E5FF">
    <animate attributeName="r" values="5;9;5" dur="2s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite" />
  </circle>
  
  <circle cx="400" cy="150" r="6" fill="#00E5FF">
    <animate attributeName="r" values="5;9;5" dur="2s" repeatCount="indefinite" begin="1s" />
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite" begin="1s" />
  </circle>
  
  <circle cx="650" cy="150" r="6" fill="#00E5FF">
    <animate attributeName="r" values="5;9;5" dur="2s" repeatCount="indefinite" begin="1.5s" />
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite" begin="1.5s" />
  </circle>

  <!-- Node Points with SMIL Floating Animation -->
  <g>
    <circle cx="300" cy="115" r="5" fill="#BD00FF" />
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-8; 0,0" dur="3s" repeatCount="indefinite" />
  </g>
  
  <g>
    <circle cx="525" cy="135" r="5" fill="#BD00FF" />
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-8; 0,0" dur="3s" repeatCount="indefinite" begin="0.8s" />
  </g>

  <!-- Technical HUD Accents -->
  <rect x="20" y="20" width="10" height="10" fill="none" stroke="#00E5FF" stroke-width="1" />
  <rect x="770" y="20" width="10" height="10" fill="none" stroke="#BD00FF" stroke-width="1" />
  <rect x="20" y="270" width="10" height="10" fill="none" stroke="#BD00FF" stroke-width="1" />
  <rect x="770" y="270" width="10" height="10" fill="none" stroke="#00E5FF" stroke-width="1" />
</svg>
