<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 240" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #0D0E15; }
      .text {
        font-family: 'Fira Code', monospace, Courier;
        font-size: 13px;
        fill: #00E5FF;
      }
      .keyword { fill: #BD00FF; }
      .string { fill: #00E5FF; opacity: 0.85; }
    </style>
  </defs>
  
  <rect class="bg" width="100%" height="100%" rx="8" />
  
  <!-- Window Controls -->
  <circle cx="20" cy="20" r="6" fill="#FF5F56" />
  <circle cx="40" cy="20" r="6" fill="#FFBD2E" />
  <circle cx="60" cy="20" r="6" fill="#27C93F" />
  
  <!-- Animated Code Lines with SMIL Opacity Animation -->
  <g class="text" transform="translate(20, 55)">
    <text x="0" y="20" opacity="0">
      <tspan class="keyword">#include</tspan> <tspan fill="#ffffff">&lt;iostream&gt;</tspan>
      <animate attributeName="opacity" to="1" begin="0.5s" fill="freeze" />
    </text>
    
    <text x="0" y="45" opacity="0">
      <tspan class="keyword">int</tspan> main() {
      <animate attributeName="opacity" to="1" begin="1.5s" fill="freeze" />
    </text>
    
    <text x="20" y="70" opacity="0">
      <tspan class="keyword">auto</tspan> dev = Developer(<tspan class="string">"AvengX"</tspan>);
      <animate attributeName="opacity" to="1" begin="2.5s" fill="freeze" />
    </text>
    
    <text x="20" y="95" opacity="0">
      dev.optimize(<tspan class="string">"AI &amp; Algorithms"</tspan>);
      <animate attributeName="opacity" to="1" begin="3.5s" fill="freeze" />
    </text>
    
    <text x="20" y="120" opacity="0">
      <tspan class="keyword">std::</tspan>cout &lt;&lt; <tspan class="string">"System State: Core Loaded\n"</tspan>;
      <animate attributeName="opacity" to="1" begin="4.5s" fill="freeze" />
    </text>
    
    <text x="20" y="145" opacity="0">
      <tspan class="keyword">return</tspan> 0;
      <animate attributeName="opacity" to="1" begin="5.5s" fill="freeze" />
    </text>
    
    <text x="0" y="170" opacity="0">
      }
      <animate attributeName="opacity" to="1" begin="6.2s" fill="freeze" />
    </text>
    
    <!-- Cursor Blinking -->
    <rect x="15" y="157" width="8" height="15" fill="#00E5FF" opacity="1">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite" />
    </rect>
  </g>
</svg>
